# ─── Synthesis: Consolidated Report ──────────────────────────────────────────

[synthesis]
id = "consolidated-report"
title = "Consolidate multi-country expansion results"
description = "Aggregate results from all 7 country legs: campaigns launched, budgets allocated, pricing set, shipping configured. Generate unified expansion report with per-country KPIs and recommendations."
skill = "data-analyze"
needs = []
type = "crew"
timeout = 600
