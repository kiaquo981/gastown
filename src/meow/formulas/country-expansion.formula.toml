# ===============================================================================
# country-expansion — Multi-Country Expansion Convoy (LP-010)
#
# Type: convoy — parallel legs per country, synthesis at the end.
# Each leg runs the same 5-step localization pipeline independently.
# The convoy aggregates results into a consolidated expansion report.
#
# "One product, seven countries, one molecule. The convoy delivers."
# ===============================================================================

[formula]
name = "country-expansion"
description = "Multi-country expansion convoy: parallel market research, copy localization, pricing, shipping, and ad launch per country"
version = 1
type = "convoy"

# ─── Variables ────────────────────────────────────────────────────────────────

[vars]

[vars.product_id]
description = "Shopify product ID to expand across countries"
required = true

[vars.base_copy]
description = "Base ad copy in source language to localize"
required = true

[vars.base_price_usd]
description = "Base product price in USD before country adjustments"
required = true

[vars.shipping_strategy]
description = "Shipping strategy: standard, express, local-warehouse, dropi-fulfillment"
required = false
default = "standard"

[vars.daily_budget_per_country]
description = "Daily ad budget per country in USD"
required = false
default = "30"

# ─── Leg 1: Argentina ────────────────────────────────────────────────────────

[[legs]]
id = "leg-ar"
title = "Argentina Expansion"

[[legs.steps]]
id = "ar-market-research"
title = "Research Argentine market for product {{product_id}}"
description = "Analyze Argentine demand, competitor landscape, Mercado Libre pricing, customs duties, and payment preferences (3/6 cuotas, Rapipago)"
skill = "data-analyze"
needs = []
type = "polecat"
timeout = 300

[[legs.steps]]
id = "ar-localize-copy"
title = "Localize copy for Argentine Spanish (voseo)"
description = "Translate and culturally adapt base copy to Argentine Spanish. Use voseo, local slang, and ARS pricing. Adjust hooks for local pain points."
skill = "content-generate"
needs = ["ar-market-research"]
type = "polecat"
timeout = 300

[[legs.steps]]
id = "ar-adjust-pricing"
title = "Set Argentine pricing with cuotas and ARS conversion"
description = "Calculate ARS price with 30% PAIS tax buffer, configure 3/6 cuotas pricing, set Mercado Pago as primary gateway"
skill = "data-analyze"
needs = ["ar-market-research"]
type = "polecat"
timeout = 120

[[legs.steps]]
id = "ar-configure-shipping"
title = "Configure shipping zones and rates for Argentina"
description = "Set up Correo Argentino / OCA rates, configure CABA same-day option, set interior zone surcharges using {{shipping_strategy}}"
skill = "shopify-manage"
needs = ["ar-adjust-pricing"]
type = "polecat"
timeout = 120

[[legs.steps]]
id = "ar-launch-ads"
title = "Launch Meta Ads campaign targeting Argentina"
description = "Create campaign with AR-localized copy, {{daily_budget_per_country}} USD daily budget, interest targeting for Argentine audience"
skill = "meta-ads-manage"
needs = ["ar-localize-copy", "ar-configure-shipping"]
type = "crew"
timeout = 300
retries = 2

# ─── Leg 2: Brazil ───────────────────────────────────────────────────────────

[[legs]]
id = "leg-br"
title = "Brazil Expansion"

[[legs.steps]]
id = "br-market-research"
title = "Research Brazilian market for product {{product_id}}"
description = "Analyze Brazilian demand via Google Trends, Shopee/Mercado Livre competition, import taxes (60% ICMS), PIX adoption rates"
skill = "data-analyze"
needs = []
type = "polecat"
timeout = 300

[[legs.steps]]
id = "br-localize-copy"
title = "Localize copy for Brazilian Portuguese"
description = "Translate and culturally adapt copy to pt-BR. Adjust idioms, use Brazilian humor style, reference local holidays and pain points."
skill = "content-generate"
needs = ["br-market-research"]
type = "polecat"
timeout = 300

[[legs.steps]]
id = "br-adjust-pricing"
title = "Set Brazilian pricing with PIX discount and BRL conversion"
description = "Calculate BRL price with import duty buffer, configure PIX 10% discount, set boleto and credit card installment options"
skill = "data-analyze"
needs = ["br-market-research"]
type = "polecat"
timeout = 120

[[legs.steps]]
id = "br-configure-shipping"
title = "Configure shipping for Brazil (Correios + transportadoras)"
description = "Set up Correios PAC/SEDEX rates, configure Jadlog/Total Express for interior, handle free-shipping-over threshold using {{shipping_strategy}}"
skill = "shopify-manage"
needs = ["br-adjust-pricing"]
type = "polecat"
timeout = 120

[[legs.steps]]
id = "br-launch-ads"
title = "Launch Meta Ads campaign targeting Brazil"
description = "Create campaign with pt-BR copy, {{daily_budget_per_country}} USD daily budget, Brazilian audience targeting and placement optimization"
skill = "meta-ads-manage"
needs = ["br-localize-copy", "br-configure-shipping"]
type = "crew"
timeout = 300
retries = 2

