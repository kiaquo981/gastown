# --- Synthesis: Consolidated Launch Report ------------------------------------

[synthesis]
id = "consolidated-launch-report"
title = "Consolidate multi-country launch results for {{product_name}}"
description = "Aggregate results from all 7 country legs: campaigns activated, budgets allocated (7 x {{daily_budget_per_country}} USD/day), pricing configured per currency, listings published. Generate unified launch report with per-country status, total daily spend, projected ROAS by market, and next-steps recommendations for scaling winners."
skill = "data-analyze"
needs = []
type = "crew"
timeout = 600
