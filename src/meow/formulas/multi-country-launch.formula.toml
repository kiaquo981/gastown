# ===============================================================================
# multi-country-launch — Simultaneous Multi-Country Product Launch Convoy (LP-033)
#
# Type: convoy — 7 parallel legs (one per LATAM country), synthesis at the end.
# Each leg runs a 4-step launch pipeline: localize, price, ads, activate.
# The convoy aggregates all results into a consolidated launch report with
# total budget allocation and projected ROAS per country.
#
# "Seven markets. One product. One coordinated strike."
# ===============================================================================

[formula]
name = "multi-country-launch"
description = "Simultaneous product launch across 7 LATAM countries: localize listings, configure pricing, create ads, and activate campaigns in parallel"
version = 1
type = "convoy"

# --- Variables ----------------------------------------------------------------

[vars]

[vars.product_id]
description = "Shopify product ID to launch across all countries"
required = true

[vars.product_name]
description = "Human-readable product name for ad copy and listings"
required = true

[vars.base_price_usd]
description = "Base product price in USD before country-specific adjustments"
required = true

[vars.base_copy]
description = "Base marketing copy in English to localize per country"
required = true

[vars.daily_budget_per_country]
description = "Daily Meta Ads budget per country in USD"
required = false
default = "25"

# --- Leg 1: Argentina ---------------------------------------------------------

[[legs]]
id = "leg-ar"
title = "Argentina Launch"

[[legs.steps]]
id = "ar-localize-listing"
title = "Localize listing for Argentina — {{product_name}}"
description = "Translate {{base_copy}} to Argentine Spanish (voseo). Adapt product title, description, and bullet points for Mercado Libre and Shopify AR storefront. Include ARS pricing display."
skill = "content-generate"
needs = []
type = "polecat"
timeout = 300

[[legs.steps]]
id = "ar-configure-pricing"
title = "Configure ARS pricing with cuotas for {{product_name}}"
description = "Convert {{base_price_usd}} to ARS with 30% PAIS tax buffer. Set up Mercado Pago gateway with 3/6/12 cuotas. Configure Rapipago cash payment fallback."
skill = "shopify-manage"
needs = ["ar-localize-listing"]
type = "polecat"
timeout = 180

[[legs.steps]]
id = "ar-create-ads"
title = "Create Meta Ads for Argentina — {{product_name}}"
description = "Generate ad creatives and copy using AR-localized listing. Target 25-54 Buenos Aires + Cordoba + Rosario. Set {{daily_budget_per_country}} USD daily budget. Optimize for purchase conversions."
skill = "meta-ads-manage"
needs = ["ar-localize-listing"]
type = "polecat"
timeout = 300

[[legs.steps]]
id = "ar-activate-campaign"
title = "Activate Argentina campaign and verify tracking"
description = "Publish Shopify AR listing, activate Meta Ads campaign, verify Pixel events firing, confirm payment gateway live. Send launch confirmation."
skill = "meta-ads-manage"
needs = ["ar-configure-pricing", "ar-create-ads"]
type = "crew"
timeout = 300
retries = 2

# --- Leg 2: Brazil ------------------------------------------------------------

[[legs]]
id = "leg-br"
title = "Brazil Launch"

[[legs.steps]]
id = "br-localize-listing"
title = "Localize listing for Brazil — {{product_name}}"
description = "Translate {{base_copy}} to Brazilian Portuguese (pt-BR). Adapt for Shopify BR storefront and marketplace listings. Include BRL pricing with PIX discount callout."
skill = "content-generate"
needs = []
type = "polecat"
timeout = 300

[[legs.steps]]
id = "br-configure-pricing"
title = "Configure BRL pricing with PIX discount for {{product_name}}"
description = "Convert {{base_price_usd}} to BRL with 60% ICMS import duty buffer. Configure PIX 10% instant discount, boleto option, and credit card 12x installments."
skill = "shopify-manage"
needs = ["br-localize-listing"]
type = "polecat"
timeout = 180

[[legs.steps]]
id = "br-create-ads"
title = "Create Meta Ads for Brazil — {{product_name}}"
description = "Generate ad creatives using pt-BR copy. Target Sao Paulo + Rio + BH + Curitiba metros. Set {{daily_budget_per_country}} USD daily budget. A/B test Reels vs Feed placement."
skill = "meta-ads-manage"
needs = ["br-localize-listing"]
type = "polecat"
timeout = 300

[[legs.steps]]
id = "br-activate-campaign"
title = "Activate Brazil campaign and verify tracking"
description = "Publish Shopify BR listing, activate Meta Ads campaign, verify Pixel + Conversions API, confirm PIX gateway operational. Send launch confirmation."
skill = "meta-ads-manage"
needs = ["br-configure-pricing", "br-create-ads"]
type = "crew"
timeout = 300
retries = 2

